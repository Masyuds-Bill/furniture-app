<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>定制家具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 520px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 { font-size: 24px; color: #1a1a1a; margin-bottom: 6px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }

    .param {
      margin-bottom: 24px;
    }

    .param-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .param-name { font-weight: 600; color: #333; font-size: 15px; }
    .param-value { color: #2d5a27; font-weight: 600; }

    input[type="range"] {
      width: 100%;
      accent-color: #2d5a27;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #2d5a27;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .btn:hover { background: #1e3d1a; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }

    .result {
      margin-top: 24px;
      padding: 16px;
      background: #f0f7ee;
      border-radius: 10px;
      font-size: 14px;
      color: #2d5a27;
      display: none;
    }

    .result.show { display: block; }
    .error { background: #fdecea; color: #c0392b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🪑 定制躺椅</h1>
    <p class="subtitle">调整参数，生成你的专属家具</p>

    <div class="param">
      <div class="param-header">
        <span class="param-name">座面宽度</span>
        <span class="param-value" id="val-width">620 mm</span>
      </div>
      <input type="range" min="400" max="900" value="620" id="seat_width"
             oninput="document.getElementById('val-width').textContent = this.value + ' mm'">
    </div>

    <div class="param">
      <div class="param-header">
        <span class="param-name">座面深度</span>
        <span class="param-value" id="val-depth">500 mm</span>
      </div>
      <input type="range" min="400" max="700" value="500" id="seat_depth"
             oninput="document.getElementById('val-depth').textContent = this.value + ' mm'">
    </div>

    <div class="param">
      <div class="param-header">
        <span class="param-name">靠背角度</span>
        <span class="param-value" id="val-angle">105°</span>
      </div>
      <input type="range" min="90" max="130" value="105" id="back_angle"
             oninput="document.getElementById('val-angle').textContent = this.value + '°'">
    </div>

    <div class="param">
      <div class="param-header">
        <span class="param-name">腿高</span>
        <span class="param-value" id="val-leg">200 mm</span>
      </div>
      <input type="range" min="100" max="400" value="200" id="leg_height"
             oninput="document.getElementById('val-leg').textContent = this.value + ' mm'">
    </div>

    <button class="btn" id="btn" onclick="generate()">生成我的家具</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    async function generate() {
  const btn = document.getElementById('btn')
  const resultDiv = document.getElementById('result')

  const params = {
    seat_width: parseInt(document.getElementById('seat_width').value),
    seat_depth: parseInt(document.getElementById('seat_depth').value),
    back_angle: parseInt(document.getElementById('back_angle').value),
    leg_height: parseInt(document.getElementById('leg_height').value),
  }

  btn.disabled = true
  btn.textContent = '生成中...'
  resultDiv.style.display = 'none'

  try {
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(params)
    })

    const data = await response.json()

    resultDiv.style.display = 'block'
    resultDiv.style.background = '#f0f7ee'
    resultDiv.style.padding = '16px'
    resultDiv.style.marginTop = '24px'
    resultDiv.style.borderRadius = '10px'
    resultDiv.style.color = '#2d5a27'
    resultDiv.innerHTML = '✅ ' + data.message + '<br><br>' +
      '座面宽度：' + data.received_params['座面宽度'] + '<br>' +
      '座面深度：' + data.received_params['座面深度'] + '<br>' +
      '靠背角度：' + data.received_params['靠背角度'] + '<br>' +
      '腿高：' + data.received_params['腿高']

  } catch (err) {
    resultDiv.style.display = 'block'
    resultDiv.style.background = '#fdecea'
    resultDiv.style.color = '#c0392b'
    resultDiv.textContent = '❌ 连接失败，请确认服务器正在运行'
  }

  btn.disabled = false
  btn.textContent = '生成我的家具'
}
  </script>
</body>
</html>
